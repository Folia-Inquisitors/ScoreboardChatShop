#Syntax:
# %scoreboardchatshop_price% - Price of specific request (only functions where applicable)
# %scoreboardchatshop_amount% - Amount of specific arequest (only functions where applicable)
# %scoreboardchatshop_material% - Material specified (only functions where applicable)
# %scoreboardchatshop_basebundleprice% - Price of base bundle (only functions where applicable)
# %scoreboardchatshop_basebundleamount% - Amount of base bundle (only functions where applicable)
# %scoreboardchatshop_basematerial% - Official material name
# %scoreboardchatshop_player% - Player shown in /shop check
# %scoreboardchatshop_rank% - Rank shown in /shop check lines
# %scoreboardchatshop_money% - Money shown in /shop check lines
#PlaceholderAPI:
# %scoreboardchatshop_buy_price_DIAMOND% - Buy price for the configured bundle
# %scoreboardchatshop_buy_amount_DIAMOND% - Buy bundle amount
# %scoreboardchatshop_buy_unit_price_DIAMOND% - Buy price per item
# %scoreboardchatshop_sell_price_DIAMOND% - Sell price for the configured bundle
# %scoreboardchatshop_sell_amount_DIAMOND% - Sell bundle amount
# %scoreboardchatshop_sell_unit_price_DIAMOND% - Sell price per item
# %scoreboardchatshop_stats_buy_top_1_item% - Player's top bought item
# %scoreboardchatshop_stats_buy_top_1_amount% - Amount bought for that rank
# %scoreboardchatshop_stats_buy_top_1_money% - Money spent for that rank
# %scoreboardchatshop_stats_sell_top_1_item% - Player's top sold item
# %scoreboardchatshop_stats_sell_top_1_amount% - Amount sold for that rank
# %scoreboardchatshop_stats_sell_top_1_money% - Money earned for that rank
# %scoreboardchatshop_stats_buy_total_amount% - Total items bought
# %scoreboardchatshop_stats_buy_total_money% - Total money spent
# %scoreboardchatshop_stats_sell_total_amount% - Total items sold
# %scoreboardchatshop_stats_sell_total_money% - Total money earned
#Coloring:
# - Standard color codes apply
# - "&?" substitutes as a random vanilla color
# - "&??" substitutes as a random hex color
# - "&>RGB######___&<RGB######" will become an RGB gradient spanning from the left hex code color to the right hex code color
#     ###### represents hex codes
#     ___ represents the text (typically a placeholder) which the gradient spans across
# - "&>LCH######___&<LCH######" will become an LCH gradient spanning from the left hex code color to the right hex code color
#     LCH traverses nicer across colors than RGB in my opinion. If you don't know the difference, not a big deal just try both.
#     ###### represents hex codes
#     ___ represents the text (typically a placeholder) which the gradient spans across
